<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menú</title>

<style>
body {
  margin:0;
  font-family:'Segoe UI';
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:white;
}

/* HEADER */
.header {
  padding:20px;
  text-align:center;
  font-size:18px;
  font-weight:bold;
}

/* CONTENIDO */
.container {
  padding:20px;
}

/* TARJETAS */
.card {
  background:white;
  color:black;
  padding:20px;
  margin-bottom:15px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
  cursor:pointer;
  transition:0.2s;
}

.card:hover {
  transform:scale(1.02);
}

/* BOTON */
.logout {
  margin-top:20px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#ff4d4d;
  color:white;
  width:100%;
}
</style>
</head>

<body>

<div class="header" id="user"></div>

<div class="container">

  <!-- TESTS -->
  <div class="card" onclick="irTest()">
    📚 <b>Test de Administración</b><br>
    <small>Haz el test completo</small>
  </div>

  <!-- HISTORIAL -->
  <div class="card" onclick="verHistorial()">
    📊 <b>Historial</b><br>
    <small>Ver tus resultados</small>
  </div>

  <!-- LOGOUT -->
  <button class="logout" onclick="logout()">Cerrar sesión</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDXbFXZhI4AMJEC4p-gLznB0NdIFt5S9KQ",
  authDomain: "testopo-5fee0.firebaseapp.com",
  projectId: "testopo-5fee0",
  storageBucket: "testopo-5fee0.firebasestorage.app",
  messagingSenderId: "1079888572782",
  appId: "1:1079888572782:web:b21bdfd01ddbc414c8917f",
  measurementId: "G-496XVBQGB2"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// 🔒 PROTEGER
onAuthStateChanged(auth, user => {
  if (user) {
    document.getElementById("user").innerText = "👤 " + user.email;
  } else {
    window.location = "index.html";
  }
});

// 🔥 IR AL TEST
window.irTest = function() {
  window.location = "test.html";
}

// 🔥 HISTORIAL (LO HAREMOS DESPUÉS)
window.verHistorial = function() {
  alert("Próximamente historial 🔥");
}

// 🔥 LOGOUT
window.logout = function() {
  signOut(auth).then(() => window.location="index.html");
}

</script>

</body>
</html>
