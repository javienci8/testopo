<!DOCTYPE html>
<html>
<body style="font-family:Segoe UI;text-align:center;margin-top:50px;">

<h2 id="user"></h2>

<button onclick="ir()">📚 Empezar Test</button>
<br><br>
<button onclick="logout()">Cerrar sesión</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_AUTH_DOMAIN",
  projectId: "TU_PROJECT_ID",
  appId: "TU_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

onAuthStateChanged(auth, user => {
  if (user) {
    document.getElementById("user").innerText = "👤 " + user.email;
  } else {
    window.location = "index.html";
  }
});

window.ir = () => window.location="test.html";

window.logout = () => {
  signOut(auth).then(() => window.location="index.html");
}

</script>

</body>
</html>
