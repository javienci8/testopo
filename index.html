<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test App</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* CONTENEDOR */
.container {
  text-align: center;
  color: white;
}

/* LOGO */
.logo {
  font-size: 60px;
  margin-bottom: 10px;
  animation: float 2s ease-in-out infinite;
}

.title {
  font-size: 26px;
  font-weight: bold;
  margin-bottom: 30px;
}

/* CARD */
.card {
  background: white;
  padding: 20px;
  border-radius: 20px;
  width: 280px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.2);
}

/* BOTONES */
button {
  width: 100%;
  padding: 14px;
  margin: 10px 0;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  font-size: 15px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

/* ANIMACIÓN LOGO */
@keyframes float {
  0% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
  100% { transform: translateY(0); }
}
</style>

</head>
<body>

<div class="container">

  <div class="logo">🧠</div>
  <div class="title">Test App</div>

  <div class="card">
    <button onclick="irTest('preguntas.json')">📚 Tema 1</button>
    <button onclick="irTest('test2.json')">📖 Tema 2</button>
  </div>

</div>

<script>
function irTest(archivo) {
  window.location.href = "test.html?test=" + archivo;
}
</script>

</body>
</html>
