<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seleccionar Test</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI';
  background: linear-gradient(135deg, #667eea, #764ba2);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: white;
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  width: 90%;
  max-width: 400px;
}

button {
  width: 100%;
  padding: 15px;
  margin: 10px 0;
  border: none;
  border-radius: 10px;
  background: #667eea;
  color: white;
  font-size: 16px;
  cursor: pointer;
}
</style>

</head>
<body>

<div class="card">
  <h2>Selecciona un Test</h2>

  <button onclick="irTest('preguntas.json')">Test Tema 1</button>
  <button onclick="irTest('test2.json')">Test Tema 2</button>

</div>

<script>
function irTest(archivo) {
  window.location.href = "test.html?test=" + archivo;
}
</script>

</body>
</html>
