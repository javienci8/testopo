<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#667eea,#764ba2);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* CARD */
.card {
  background: white;
  padding: 30px 25px;
  border-radius: 20px;
  width: 90%;
  max-width: 350px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

/* TITULO */
h2 {
  margin-bottom: 20px;
}

/* INPUTS */
input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 12px;
  border: 1px solid #ddd;
  font-size: 14px;
  outline: none;
  transition: 0.2s;
}

input:focus {
  border-color: #667eea;
  box-shadow: 0 0 5px rgba(102,126,234,0.4);
}

/* BOTONES */
button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg,#667eea,#764ba2);
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.03);
  opacity: 0.9;
}

/* MENSAJE */
#msg {
  margin-top: 10px;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="card">
  <h2>🔐 Test App</h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Contraseña">

  <button onclick="register()">Registrarse</button>
  <button onclick="login()">Entrar</button>

  <p id="msg"></p>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDXbFXZhI4AMJEC4p-gLznB0NdIFt5S9KQ",
  authDomain: "testopo-5fee0.firebaseapp.com",
  projectId: "testopo-5fee0",
  storageBucket: "testopo-5fee0.firebasestorage.app",
  messagingSenderId: "1079888572782",
  appId: "1:1079888572782:web:b21bdfd01ddbc414c8917f",
  measurementId: "G-496XVBQGB2"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.register = () => {
  createUserWithEmailAndPassword(auth, email.value, password.value)
    .then(() => msg.innerText="Usuario creado ✅")
    .catch(e => msg.innerText=e.message);
}

window.login = () => {
  signInWithEmailAndPassword(auth, email.value, password.value)
    .then(() => window.location="menu.html")
    .catch(e => msg.innerText="Error login ❌");
}

</script>

</body>
</html>
