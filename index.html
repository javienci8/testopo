<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test PRO</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
}

.container {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 15px;
}

.card {
  background: white;
  color: black;
  padding: 20px;
  border-radius: 20px;
  width: 100%;
  max-width: 500px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  text-align: center;
}

/* 🔥 PROGRESO */
.progress-container {
  background: #eee;
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 15px;
}

.progress-bar {
  height: 10px;
  width: 0%;
  background: linear-gradient(90deg, #667eea, #764ba2);
  transition: width 0.3s;
}

/* 🔥 PREGUNTA */
#pregunta {
  font-size: 18px;
  margin-bottom: 15px;
}

/* 🔥 RESPUESTAS */
#respuestas button {
  display: block;
  width: 100%;
  margin: 8px 0;
  padding: 14px;
  border: none;
  border-radius: 12px;
  background: #f5f5f5;
  cursor: pointer;
  font-size: 15px;
  transition: 0.2s;
}

#respuestas button:hover {
  background: #ddd;
}

/* 🔥 FEEDBACK */
.correcto {
  color: #2ecc71;
  font-weight: bold;
}

.incorrecto {
  color: #e74c3c;
  font-weight: bold;
}

#explicacion {
  margin-top: 10px;
  font-size: 14px;
  color: #555;
}

/* 🔥 BOTÓN */
.next-btn {
  margin-top: 15px;
  padding: 12px;
  width: 100%;
  border: none;
  border-radius: 12px;
  background: #667eea;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

.next-btn:hover {
  background: #5563c1;
}

#resultado {
  margin-top: 20px;
  font-size: 18px;
  font-weight: bold;
}

/* 📱 MÓVIL */
@media (max-width: 500px) {
  #pregunta {
    font-size: 16px;
  }
}
</style>

</head>
<body>

<div class="container">
  <div class="card">

    <!-- 🔥 BARRA PROGRESO -->
    <div class="progress-container">
      <div class="progress-bar" id="progress"></div>
    </div>

    <h2 id="pregunta">Cargando...</h2>

    <div id="respuestas"></div>

    <div id="feedback"></div>
    <div id="explicacion"></div>

    <button class="next-btn" onclick="siguiente()">Siguiente</button>

    <div id="resultado"></div>

  </div>
</div>

<script>

let preguntas = [];
let index = 0;
let puntos = 0;
let respondida = false;

// Cargar preguntas
fetch("preguntas.json")
  .then(res => res.json())
  .then(data => {
    preguntas = data;
    cargarPregunta();
  });

function actualizarProgreso() {
  const progreso = ((index) / preguntas.length) * 100;
  document.getElementById("progress").style.width = progreso + "%";
}

function cargarPregunta() {
  respondida = false;

  actualizarProgreso();

  document.getElementById("feedback").innerText = "";
  document.getElementById("explicacion").innerText = "";

  const p = preguntas[index];
  document.getElementById("pregunta").innerText = p.pregunta;

  const cont = document.getElementById("respuestas");
  cont.innerHTML = "";

  p.respuestas.forEach((r, i) => {
    const btn = document.createElement("button");
    btn.innerText = r;
    btn.onclick = () => responder(i);
    cont.appendChild(btn);
  });
}

function responder(i) {
  if (respondida) return;
  respondida = true;

  const p = preguntas[index];

  if (i === p.correcta) {
    puntos++;
    document.getElementById("feedback").innerHTML = "✅ Correcto";
    document.getElementById("feedback").className = "correcto";
  } else {
    document.getElementById("feedback").innerHTML = "❌ Incorrecto";
    document.getElementById("feedback").className = "incorrecto";
    document.getElementById("explicacion").innerText = p.explicacion;
  }
}

function siguiente() {
  index++;

  if (index < preguntas.length) {
    cargarPregunta();
  } else {
    document.getElementById("progress").style.width = "100%";
    document.getElementById("pregunta").innerText = "Test terminado";
    document.getElementById("respuestas").innerHTML = "";
    document.getElementById("feedback").innerText = "";
    document.getElementById("explicacion").innerText = "";
    document.getElementById("resultado").innerText =
      "Resultado: " + puntos + "/" + preguntas.length;
  }
}

</script>

</body>
</html>
