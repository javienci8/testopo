<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test</title>

<style>
body {
  margin:0;
  font-family:'Segoe UI';
  background:linear-gradient(135deg,#667eea,#764ba2);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card {
  background:white;
  padding:25px;
  border-radius:20px;
  width:90%;
  max-width:500px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

button {
  width:100%;
  padding:12px;
  margin:5px 0;
  border:none;
  border-radius:10px;
  background:#667eea;
  color:white;
  cursor:pointer;
}

.correcto { color:green; }
.incorrecto { color:red; }

.progress {
  height:8px;
  background:#eee;
  border-radius:10px;
  margin-bottom:15px;
}

.progress-bar {
  height:8px;
  background:linear-gradient(90deg,#667eea,#764ba2);
  border-radius:10px;
  width:0%;
}
</style>
</head>

<body>

<div class="card">

<div class="progress">
  <div class="progress-bar" id="progress"></div>
</div>

<h2 id="pregunta">Cargando...</h2>

<div id="respuestas"></div>

<h3 id="feedback"></h3>
<p id="explicacion"></p>

<button onclick="siguiente()">Siguiente</button>

<h3 id="resultado"></h3>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, setDoc } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔥 TU CONFIG (NO TOCAR SI YA LA TIENES)
const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_AUTH_DOMAIN",
  projectId: "TU_PROJECT_ID",
  appId: "TU_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 🔒 PROTEGER ACCESO
onAuthStateChanged(auth, user => {
  if (!user) {
    window.location = "index.html";
  }
});

let preguntas = [];
let index = 0;
let puntos = 0;
let respondida = false;

// 🔥 CARGAR PREGUNTAS
fetch("preguntas.json")
.then(res => res.json())
.then(data => {
  preguntas = data;
  cargarPregunta();
})
.catch(() => {
  document.getElementById("pregunta").innerText = "Error cargando preguntas";
});

// 🔥 MOSTRAR PREGUNTA
function cargarPregunta() {
  respondida = false;
  feedback.innerText = "";
  explicacion.innerText = "";

  const p = preguntas[index];

  pregunta.innerText = p.pregunta;
  respuestas.innerHTML = "";

  p.respuestas.forEach((r, i) => {
    const btn = document.createElement("button");
    btn.innerText = r;
    btn.onclick = () => responder(i);
    respuestas.appendChild(btn);
  });

  let progreso = (index / preguntas.length) * 100;
  document.getElementById("progress").style.width = progreso + "%";
}

// 🔥 RESPONDER
function responder(i) {
  if (respondida) return;

  respondida = true;
  const p = preguntas[index];

  if (i === p.correcta) {
    puntos++;
    feedback.innerText = "✅ Correcto";
    feedback.className = "correcto";
  } else {
    feedback.innerText = "❌ Incorrecto";
    feedback.className = "incorrecto";
    explicacion.innerText = p.explicacion;
  }
}

// 🔥 SIGUIENTE + GUARDAR RESULTADO
window.siguiente = async function() {
  index++;

  if (index < preguntas.length) {
    cargarPregunta();
  } else {

    pregunta.innerText = "🎉 Test terminado";
    respuestas.innerHTML = "";
    feedback.innerText = "";

    resultado.innerText = "Resultado: " + puntos + "/" + preguntas.length;

    document.getElementById("progress").style.width = "100%";

    // 💾 GUARDAR EN FIREBASE
    const user = auth.currentUser;

    if (user) {
      await setDoc(doc(db, "resultados", user.uid), {
        puntuacion: puntos,
        total: preguntas.length,
        fecha: new Date().toISOString()
      });
    }
  }
}

</script>

</body>
</html>
