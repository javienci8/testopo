<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test PRO</title>

  <style>
    body {
      font-family: Arial;
      background: #f0f0f0;
      margin: 0;
      padding: 15px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 12px;
      max-width: 500px;
      margin: auto;
    }

    button {
      display: block;
      width: 100%;
      margin: 8px 0;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #ddd;
    }

    .correcta { background: #4CAF50; color: white; }
    .incorrecta { background: #f44336; color: white; }

    #stats, #contador, #tiempo {
      text-align: center;
      margin: 5px 0;
    }

    #barra {
      height: 10px;
      background: #ddd;
      border-radius: 5px;
      overflow: hidden;
    }

    #progreso {
      height: 100%;
      width: 0%;
      background: #4CAF50;
    }

    .lista {
      margin-top: 10px;
      font-size: 12px;
      max-height: 100px;
      overflow-y: auto;
    }

    .acierto { color: green; }
    .fallo { color: red; }

    #repetir {
      background: #ff9800;
      color: white;
    }
  </style>
</head>
<body>

<div class="card">
  <div id="contador"></div>
  <div id="stats"></div>

  <div id="barra"><div id="progreso"></div></div>

  <div id="tiempo">⏱ 0s</div>

  <div id="pregunta"></div>
  <div id="opciones"></div>
  <div id="resultado"></div>
  <div id="explicacion"></div>

  <button id="siguiente" onclick="siguientePregunta()" style="display:none;">Siguiente</button>
  <button id="repetir" onclick="repetirFallos()" style="display:none;">🔁 Repetir fallos</button>

  <div class="lista">
    <strong>✔ Aciertos:</strong>
    <div id="listaAciertos"></div>

    <strong>❌ Fallos:</strong>
    <div id="listaFallos"></div>
  </div>
</div>

<script>
let preguntasOriginal = [];
let preguntas = [];
let fallos = [];
let aciertosLista = [];

let actual = 0;
let aciertos = 0;
let errores = 0;
let tiempo = 0;

setInterval(() => {
  tiempo++;
  document.getElementById("tiempo").innerText = `⏱ ${tiempo}s`;
}, 1000);

fetch("preguntas.json")
  .then(res => res.json())
  .then(data => {
    preguntasOriginal = data;
    preguntas = [...data];
    mostrarPregunta();
  });

function mostrarPregunta() {
  const p = preguntas[actual];

  document.getElementById("contador").innerText =
    `Pregunta ${actual + 1} de ${preguntas.length}`;

  document.getElementById("stats").innerText =
    `✅ ${aciertos} | ❌ ${errores}`;

  document.getElementById("progreso").style.width =
    `${(actual / preguntas.length) * 100}%`;

  document.getElementById("pregunta").innerHTML =
    `<strong>${p.pregunta}</strong>`;

  const contenedor = document.getElementById("opciones");
  contenedor.innerHTML = "";

  p.opciones.forEach((op, i) => {
    const btn = document.createElement("button");
    btn.innerText = op;
    btn.onclick = () => responder(i, btn);
    contenedor.appendChild(btn);
  });

  document.getElementById("resultado").innerText = "";
  document.getElementById("explicacion").innerText = "";
  document.getElementById("siguiente").style.display = "none";
}

function actualizarListas() {
  document.getElementById("listaAciertos").innerHTML =
    aciertosLista.map((p, i) => `<div class="acierto">${i+1}. ${p}</div>`).join("");

  document.getElementById("listaFallos").innerHTML =
    fallos.map((p, i) => `<div class="fallo">${i+1}. ${p}</div>`).join("");
}

function responder(indice, boton) {
  const correcta = preguntas[actual].respuesta;
  const botones = document.querySelectorAll("#opciones button");

  botones.forEach((btn, i) => {
    btn.disabled = true;
    if (i === correcta) btn.classList.add("correcta");
    if (i === indice && i !== correcta) btn.classList.add("incorrecta");
  });

  if (indice === correcta) {
    aciertos++;
    aciertosLista.push(preguntas[actual].pregunta);
    document.getElementById("resultado").innerText = "✅ Correcto";
  } else {
    errores++;
    fallos.push(preguntas[actual]);
    document.getElementById("resultado").innerText = "❌ Incorrecto";
  }

  actualizarListas();

  document.getElementById("explicacion").innerText =
    preguntas[actual].explicacion || "";

  document.getElementById("siguiente").style.display = "block";
}

function siguientePregunta() {
  actual++;

  if (actual < preguntas.length) {
    mostrarPregunta();
  } else {
    finTest();
  }
}

function finTest() {
  document.getElementById("repetir").style.display =
    fallos.length > 0 ? "block" : "none";

  document.getElementById("resultado").innerText =
    `Test terminado → ✅ ${aciertos} | ❌ ${errores}`;
}

function repetirFallos() {
  if (fallos.length === 0) {
    alert("No hay fallos 🎉");
    return;
  }

  preguntas = [...fallos];
  fallos = [];
  actual = 0;
  aciertos = 0;
  errores = 0;
  aciertosLista = [];

  actualizarListas();
  mostrarPregunta();
}
</script>

</body>
</html>
