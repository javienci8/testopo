<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Test completo</title>
  <style>
    body {
      font-family: Arial;
      background: #f0f0f0;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .pregunta {
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
    }

    button {
      display: block;
      margin: 5px 0;
      padding: 8px;
      width: 100%;
      cursor: pointer;
    }

    .correcta {
      background-color: #4CAF50;
      color: white;
    }

    .incorrecta {
      background-color: #f44336;
      color: white;
    }

    #resultado {
      font-size: 20px;
      text-align: center;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<h1>📘 Test completo</h1>

<div id="contenedor"></div>
<button onclick="corregir()">Corregir test</button>

<div id="resultado"></div>

<script>
let preguntasGlobal = [];
let respuestasUsuario = [];

fetch("preguntas.json")
  .then(res => {
    if (!res.ok) {
      throw new Error("No se pudo cargar preguntas.json");
    }
    return res.json();
  })
  .then(preguntas => {

    console.log("Preguntas cargadas:", preguntas);

    preguntasGlobal = preguntas;

    const contenedor = document.getElementById("contenedor");

    preguntas.forEach((p, index) => {

      const div = document.createElement("div");
      div.className = "pregunta";

      let html = `<p><strong>${index + 1}. ${p.pregunta}</strong></p>`;

      const letras = ["A", "B", "C", "D"];

      p.opciones.forEach((op, i) => {
        html += `<button onclick="responder(${index}, ${i}, this)">
          ${letras[i]}) ${op}
        </button>`;
      });

      div.innerHTML = html;
      contenedor.appendChild(div);
    });

  })
  .catch(error => {
    console.error("ERROR:", error);
    document.getElementById("contenedor").innerHTML =
      "<p style='color:red'>Error cargando preguntas.json</p>";
  });

function responder(preguntaIndex, opcionIndex, boton) {
  respuestasUsuario[preguntaIndex] = opcionIndex;

  const botones = boton.parentElement.querySelectorAll("button");
  botones.forEach(b => b.classList.remove("seleccionado"));

  boton.classList.add("seleccionado");
}

function corregir() {
  let aciertos = 0;

  document.querySelectorAll(".pregunta").forEach((div, index) => {

    const botones = div.querySelectorAll("button");
    const correcta = preguntasGlobal[index].respuesta;

    botones.forEach((btn, i) => {
      btn.classList.remove("correcta", "incorrecta");

      if (i === correcta) {
        btn.classList.add("correcta");
      }

      if (respuestasUsuario[index] === i && i !== correcta) {
        btn.classList.add("incorrecta");
      }
    });

    if (respuestasUsuario[index] === correcta) {
      aciertos++;
    }

  });

  document.getElementById("resultado").innerText =
    `Has acertado ${aciertos} de ${preguntasGlobal.length}`;
}
</script>

</body>
</html>
