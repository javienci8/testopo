<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test PRO</title>

  <style>
    body {
      font-family: Arial;
      background: #f0f0f0;
      margin: 0;
      padding: 15px;
    }

    body.dark {
      background: #121212;
      color: white;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 12px;
      max-width: 500px;
      margin: auto;
    }

    body.dark .card {
      background: #1e1e1e;
    }

    button {
      display: block;
      width: 100%;
      margin: 8px 0;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #ddd;
    }

    body.dark button {
      background: #333;
      color: white;
    }

    .correcta { background: #4CAF50; color: white; }
    .incorrecta { background: #f44336; color: white; }

    #stats, #contador, #tiempo {
      text-align: center;
      margin: 5px 0;
    }

    #barra {
      height: 10px;
      background: #ddd;
      border-radius: 5px;
      overflow: hidden;
    }

    #progreso {
      height: 100%;
      width: 0%;
      background: #4CAF50;
    }
  </style>
</head>
<body>

<button onclick="toggleModo()">🌙 Cambiar modo</button>

<div class="card">
  <div id="contador"></div>
  <div id="stats"></div>

  <div id="barra"><div id="progreso"></div></div>

  <div id="tiempo">⏱ 0s</div>

  <div id="pregunta"></div>
  <div id="opciones"></div>
  <div id="resultado"></div>
  <div id="explicacion"></div>

  <button id="siguiente" onclick="siguientePregunta()" style="display:none;">Siguiente</button>
</div>

<script>
let preguntas = [];
let fallos = [];
let actual = 0;
let aciertos = 0;
let errores = 0;
let tiempo = 0;

setInterval(() => {
  tiempo++;
  document.getElementById("tiempo").innerText = `⏱ ${tiempo}s`;
}, 1000);

fetch("preguntas.json")
  .then(res => res.json())
  .then(data => {
    preguntas = data;
    cargarProgreso();
    mostrarPregunta();
  });

function mostrarPregunta() {
  const p = preguntas[actual];

  document.getElementById("contador").innerText =
    `Pregunta ${actual + 1} de ${preguntas.length}`;

  document.getElementById("stats").innerText =
    `✅ ${aciertos} | ❌ ${errores}`;

  document.getElementById("progreso").style.width =
    `${(actual / preguntas.length) * 100}%`;

  document.getElementById("pregunta").innerHTML =
    `<strong>${p.pregunta}</strong>`;

  const contenedor = document.getElementById("opciones");
  contenedor.innerHTML = "";

  p.opciones.forEach((op, i) => {
    const btn = document.createElement("button");
    btn.innerText = op;
    btn.onclick = () => responder(i, btn);
    contenedor.appendChild(btn);
  });

  document.getElementById("resultado").innerText = "";
  document.getElementById("explicacion").innerText = "";
  document.getElementById("siguiente").style.display = "none";
}

function responder(indice, boton) {
  const correcta = preguntas[actual].respuesta;
  const botones = document.querySelectorAll("#opciones button");

  botones.forEach((btn, i) => {
    btn.disabled = true;
    if (i === correcta) btn.classList.add("correcta");
    if (i === indice && i !== correcta) btn.classList.add("incorrecta");
  });

  if (indice === correcta) {
    aciertos++;
  } else {
    errores++;
    fallos.push(preguntas[actual]);
  }

  document.getElementById("resultado").innerText =
    indice === correcta ? "✅ Correcto" : "❌ Incorrecto";

  document.getElementById("explicacion").innerText =
    preguntas[actual].explicacion || "";

  guardarProgreso();

  document.getElementById("siguiente").style.display = "block";
}

function siguientePregunta() {
  actual++;
  if (actual < preguntas.length) {
    mostrarPregunta();
  } else {
    finTest();
  }
}

function finTest() {
  if (fallos.length > 0) {
    document.querySelector(".card").innerHTML =
      `<h2>Test terminado</h2>
       <p>✅ ${aciertos} | ❌ ${errores}</p>
       <button onclick="repetirFallos()">Repetir hasta acertar TODO</button>`;
  } else {
    document.querySelector(".card").innerHTML =
      `<h2>Perfecto 🎉</h2>
       <p>Todo correcto</p>`;
  }

  localStorage.removeItem("progreso");
}

function repetirFallos() {
  preguntas = [...fallos];
  fallos = [];
  actual = 0;
  aciertos = 0;
  errores = 0;
  mostrarPregunta();
}

function guardarProgreso() {
  localStorage.setItem("progreso", JSON.stringify({
    actual, aciertos, errores, fallos
  }));
}

function cargarProgreso() {
  const data = JSON.parse(localStorage.getItem("progreso"));
  if (data) {
    actual = data.actual;
    aciertos = data.aciertos;
    errores = data.errores;
    fallos = data.fallos;
  }
}

function toggleModo() {
  document.body.classList.toggle("dark");
}
</script>

</body>
</html>
