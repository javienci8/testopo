<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test PRO</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      padding: 15px;
      margin: 0;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 500px;
      margin: auto;
      text-align: center;
    }

    #contador {
      font-size: 14px;
      margin-bottom: 5px;
    }

    #barra {
      height: 10px;
      background: #ddd;
      border-radius: 5px;
      overflow: hidden;
      margin-bottom: 10px;
    }

    #progreso {
      height: 100%;
      width: 0%;
      background: #4CAF50;
    }

    #pregunta {
      font-size: 18px;
      margin-bottom: 15px;
    }

    button {
      width: 100%;
      margin: 8px 0;
      padding: 12px;
      border: none;
      border-radius: 8px;
      text-align: left;
      background: #e0e0e0;
    }

    .correcta { background: #4CAF50; color: white; }
    .incorrecta { background: #f44336; color: white; }

    #resultado {
      font-size: 18px;
      margin-top: 10px;
    }

    #explicacion {
      margin-top: 10px;
      background: #fafafa;
      padding: 10px;
      border-radius: 8px;
    }

    #siguiente { background: #2196F3; color: white; }
    #anterior { background: #9e9e9e; color: white; }
    #repetir { background: #ff9800; color: white; }
    #finalizar { background: #f44336; color: white; }
    #historialBtn { background: #673ab7; color: white; }
  </style>
</head>
<body>

<div class="card">
  <div id="contador"></div>

  <div id="barra">
    <div id="progreso"></div>
  </div>

  <div id="pregunta"></div>
  <div id="opciones"></div>
  <div id="resultado"></div>
  <div id="explicacion"></div>

  <button id="anterior" onclick="anteriorPregunta()">⬅ Anterior</button>
  <button id="siguiente" onclick="siguientePregunta()" style="display:none;">Siguiente ➡</button>
  <button id="finalizar" onclick="finTest()">⛔ Finalizar test</button>
</div>

<script>
let preguntas = [];
let fallos = [];
let actual = 0;
let aciertos = 0;
let errores = 0;

fetch("preguntas.json")
  .then(res => res.json())
  .then(data => {
    preguntas = data;
    mostrarPregunta();
  });

function mostrarPregunta() {
  const p = preguntas[actual];

  document.getElementById("contador").innerText =
    `Pregunta ${actual + 1} de ${preguntas.length}`;

  document.getElementById("progreso").style.width =
    `${(actual / preguntas.length) * 100}%`;

  document.getElementById("pregunta").innerText = p.pregunta;

  const contenedor = document.getElementById("opciones");
  contenedor.innerHTML = "";

  p.opciones.forEach((op, i) => {
    const btn = document.createElement("button");
    btn.innerText = op;
    btn.onclick = () => responder(i, btn);
    contenedor.appendChild(btn);
  });

  document.getElementById("resultado").innerText = "";
  document.getElementById("explicacion").innerText = "";
  document.getElementById("siguiente").style.display = "none";
}

function responder(indice, boton) {
  const correcta = preguntas[actual].respuesta;
  const botones = document.querySelectorAll("#opciones button");

  botones.forEach((btn, i) => {
    btn.disabled = true;
    if (i === correcta) btn.classList.add("correcta");
    if (i === indice && i !== correcta) btn.classList.add("incorrecta");
  });

  if (indice === correcta) {
    aciertos++;
    document.getElementById("resultado").innerText = "✅ Correcto";
  } else {
    errores++;
    fallos.push(preguntas[actual]);
    document.getElementById("resultado").innerText = "❌ Incorrecto";
  }

  document.getElementById("explicacion").innerText =
    preguntas[actual].explicacion || "";

  document.getElementById("siguiente").style.display = "block";
}

function siguientePregunta() {
  actual++;
  if (actual < preguntas.length) {
    mostrarPregunta();
  } else {
    finTest();
  }
}

function anteriorPregunta() {
  if (actual > 0) {
    actual--;
    mostrarPregunta();
  }
}

function guardarResultado() {
  const tema = preguntas[0]?.tema || "General";
  const porcentaje = ((aciertos / preguntas.length) * 100).toFixed(1);

  const resultado = {
    tema,
    aciertos,
    errores,
    total: preguntas.length,
    porcentaje,
    fecha: new Date().toLocaleString()
  };

  let historial = JSON.parse(localStorage.getItem("historial")) || [];
  historial.push(resultado);
  localStorage.setItem("historial", JSON.stringify(historial));
}

function finTest() {
  guardarResultado();

  const porcentaje = ((aciertos / preguntas.length) * 100).toFixed(1);

  document.querySelector(".card").innerHTML =
    `<h2>Test finalizado</h2>
     <p>✅ ${aciertos} | ❌ ${errores}</p>
     <p>📊 ${porcentaje}%</p>
     ${fallos.length > 0 ? '<button id="repetir" onclick="repetirFallos()">Repetir fallos</button>' : ''}
     <button id="historialBtn" onclick="verHistorial()">Ver historial</button>`;
}

function repetirFallos() {
  preguntas = [...fallos];
  fallos = [];
  actual = 0;
  aciertos = 0;
  errores = 0;
  mostrarPregunta();
}

function verHistorial() {
  let historial = JSON.parse(localStorage.getItem("historial")) || [];

  let html = "<h2>Historial</h2>";

  historial.reverse().forEach(r => {
    html += `
      <div>
        📅 ${r.fecha}<br>
        📘 ${r.tema}<br>
        ✅ ${r.aciertos}/${r.total} — ${r.porcentaje}%<br><br>
      </div>
    `;
  });

  html += `<button onclick="location.reload()">Volver</button>`;

  document.querySelector(".card").innerHTML = html;
}
</script>

</body>
</html>
