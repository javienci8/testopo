<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* HEADER */
.header {
  width: 100%;
  padding: 15px;
  text-align: center;
  color: white;
  font-weight: bold;
  font-size: 18px;
}

/* CARD */
.card {
  background: white;
  width: 90%;
  max-width: 500px;
  border-radius: 20px;
  padding: 20px;
  margin-top: 20px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.2);
  animation: fadeIn 0.4s ease;
}

/* PROGRESO */
.progress-container {
  background: #eee;
  border-radius: 20px;
  overflow: hidden;
  height: 8px;
  margin-bottom: 15px;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #667eea, #764ba2);
  transition: 0.3s;
}

/* PREGUNTA */
#pregunta {
  font-size: 18px;
  margin-bottom: 20px;
}

/* RESPUESTAS */
#respuestas button {
  width: 100%;
  padding: 14px;
  margin: 8px 0;
  border: none;
  border-radius: 14px;
  background: #f5f6fa;
  font-size: 15px;
  cursor: pointer;
  transition: 0.2s;
}

#respuestas button:hover {
  background: #e0e3ff;
  transform: scale(1.02);
}

/* FEEDBACK */
.correcto {
  color: #2ecc71;
  font-weight: bold;
}

.incorrecto {
  color: #e74c3c;
  font-weight: bold;
}

#explicacion {
  margin-top: 10px;
  font-size: 14px;
  color: #555;
}

/* BOTÓN */
.next-btn {
  margin-top: 15px;
  padding: 14px;
  width: 100%;
  border: none;
  border-radius: 14px;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

.next-btn:hover {
  transform: scale(1.03);
}

/* RESULTADO */
#resultado {
  margin-top: 20px;
  font-size: 20px;
  font-weight: bold;
}

/* ANIMACIÓN */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px);}
  to { opacity: 1; transform: translateY(0);}
}
</style>

</head>
<body>

<div class="header">
  📚 Test App
</div>

<div class="card">

  <div class="progress-container">
    <div class="progress-bar" id="progress"></div>
  </div>

  <h2 id="pregunta">Cargando...</h2>

  <div id="respuestas"></div>

  <div id="feedback"></div>
  <div id="explicacion"></div>

  <button class="next-btn" onclick="siguiente()">Siguiente</button>

  <div id="resultado"></div>

</div>

<script>

let preguntas = [];
let index = 0;
let puntos = 0;
let respondida = false;

const params = new URLSearchParams(window.location.search);
const archivo = params.get("test") || "preguntas.json";

fetch(archivo)
  .then(res => res.json())
  .then(data => {
    preguntas = data;
    cargarPregunta();
  });

function actualizarProgreso() {
  document.getElementById("progress").style.width =
    (index / preguntas.length) * 100 + "%";
}

function cargarPregunta() {
  respondida = false;
  actualizarProgreso();

  const p = preguntas[index];

  document.getElementById("pregunta").innerText = p.pregunta;

  const cont = document.getElementById("respuestas");
  cont.innerHTML = "";

  p.respuestas.forEach((r, i) => {
    const btn = document.createElement("button");
    btn.innerText = r;
    btn.onclick = () => responder(i);
    cont.appendChild(btn);
  });

  document.getElementById("feedback").innerText = "";
  document.getElementById("explicacion").innerText = "";
}

function responder(i) {
  if (respondida) return;
  respondida = true;

  const p = preguntas[index];

  if (i === p.correcta) {
    puntos++;
    document.getElementById("feedback").innerText = "✅ Correcto";
    document.getElementById("feedback").className = "correcto";
  } else {
    document.getElementById("feedback").innerText = "❌ Incorrecto";
    document.getElementById("feedback").className = "incorrecto";
    document.getElementById("explicacion").innerText = p.explicacion;
  }
}

function siguiente() {
  index++;

  if (index < preguntas.length) {
    cargarPregunta();
  } else {
    document.getElementById("progress").style.width = "100%";
    document.getElementById("pregunta").innerText = "🎉 Test terminado";
    document.getElementById("respuestas").innerHTML = "";
    document.getElementById("resultado").innerText =
      "Resultado: " + puntos + "/" + preguntas.length;
  }
}

</script>

</body>
</html>
