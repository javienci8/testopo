<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test tipo examen</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      padding: 15px;
      margin: 0;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 500px;
      margin: auto;
      text-align: center;
    }

    #contador {
      font-size: 14px;
      color: #666;
      margin-bottom: 10px;
    }

    #pregunta {
      font-size: 18px;
      margin-bottom: 15px;
    }

    button {
      width: 100%;
      margin: 8px 0;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #e0e0e0;
      font-size: 14px;
      text-align: left;
    }

    .correcta {
      background: #4CAF50;
      color: white;
    }

    .incorrecta {
      background: #f44336;
      color: white;
    }

    #resultado {
      font-size: 18px;
      margin-top: 10px;
    }

    #explicacion {
      margin-top: 10px;
      font-size: 14px;
      background: #fafafa;
      padding: 10px;
      border-radius: 8px;
    }

    #siguiente {
      margin-top: 15px;
      background: #2196F3;
      color: white;
      font-weight: bold;
    }

    #final {
      font-size: 18px;
    }

    #repetir {
      background: #ff9800;
      color: white;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<div class="card">
  <div id="contador"></div>
  <div id="pregunta"></div>
  <div id="opciones"></div>
  <div id="resultado"></div>
  <div id="explicacion"></div>

  <button id="siguiente" onclick="siguientePregunta()" style="display:none;">Siguiente</button>
</div>

<script>
let preguntas = [];
let fallos = [];

let actual = 0;
let aciertos = 0;
let errores = 0;

fetch("preguntas.json")
  .then(res => res.json())
  .then(data => {
    preguntas = data;
    mostrarPregunta();
  });

function mostrarPregunta() {
  const p = preguntas[actual];

  document.getElementById("contador").innerText =
    `Pregunta ${actual + 1} de ${preguntas.length}`;

  document.getElementById("pregunta").innerText = p.pregunta;

  const contenedor = document.getElementById("opciones");
  contenedor.innerHTML = "";

  p.opciones.forEach((op, i) => {
    const btn = document.createElement("button");
    btn.innerText = op;
    btn.onclick = () => responder(i, btn);
    contenedor.appendChild(btn);
  });

  document.getElementById("resultado").innerText = "";
  document.getElementById("explicacion").innerText = "";
  document.getElementById("siguiente").style.display = "none";
}

function responder(indice, boton) {
  const correcta = preguntas[actual].respuesta;
  const botones = document.querySelectorAll("#opciones button");

  botones.forEach((btn, i) => {
    btn.disabled = true;

    if (i === correcta) btn.classList.add("correcta");
    if (i === indice && i !== correcta) btn.classList.add("incorrecta");
  });

  if (indice === correcta) {
    aciertos++;
    document.getElementById("resultado").innerText = "✅ Correcto";
  } else {
    errores++;
    fallos.push(preguntas[actual]);
    document.getElementById("resultado").innerText = "❌ Incorrecto";
  }

  document.getElementById("explicacion").innerText =
    preguntas[actual].explicacion || "";

  document.getElementById("siguiente").style.display = "block";
}

function siguientePregunta() {
  actual++;

  if (actual < preguntas.length) {
    mostrarPregunta();
  } else {
    finTest();
  }
}

function finTest() {
  document.querySelector(".card").innerHTML =
    `<div id="final">
      <h2>Test terminado</h2>
      <p>✅ Aciertos: ${aciertos}</p>
      <p>❌ Fallos: ${errores}</p>
      ${fallos.length > 0 ? '<button id="repetir" onclick="repetirFallos()">Repetir fallos</button>' : ''}
    </div>`;
}

function repetirFallos() {
  preguntas = [...fallos];
  fallos = [];
  actual = 0;
  aciertos = 0;
  errores = 0;

  document.body.innerHTML = `
    <div class="card">
      <div id="contador"></div>
      <div id="pregunta"></div>
      <div id="opciones"></div>
      <div id="resultado"></div>
      <div id="explicacion"></div>
      <button id="siguiente" onclick="siguientePregunta()" style="display:none;">Siguiente</button>
    </div>
  `;

  mostrarPregunta();
}
</script>

</body>
</html>
