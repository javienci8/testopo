<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test modo examen</title>

  <style>
    body {
      font-family: Arial;
      background: #f0f0f0;
      margin: 0;
      padding: 15px;
    }

    h1 {
      text-align: center;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 12px;
      max-width: 500px;
      margin: auto;
    }

    #contador {
      text-align: center;
      font-size: 14px;
      margin-bottom: 5px;
    }

    #barra {
      height: 10px;
      background: #ddd;
      border-radius: 5px;
      overflow: hidden;
      margin-bottom: 10px;
    }

    #progreso {
      height: 100%;
      width: 0%;
      background: #4CAF50;
    }

    #tiempo {
      text-align: center;
      font-weight: bold;
      margin-bottom: 10px;
    }

    button {
      display: block;
      width: 100%;
      margin: 8px 0;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #ddd;
      font-size: 14px;
      text-align: left;
    }

    .correcta {
      background: #4CAF50;
      color: white;
    }

    .incorrecta {
      background: #f44336;
      color: white;
    }

    #resultado {
      font-size: 18px;
      margin-top: 10px;
      text-align: center;
    }

    #explicacion {
      margin-top: 10px;
      background: #fafafa;
      padding: 10px;
      border-radius: 8px;
    }

    #siguiente {
      background: #2196F3;
      color: white;
      font-weight: bold;
    }

    #repetir {
      background: #ff9800;
      color: white;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<h1>📘 Test</h1>

<div class="card">
  <div id="contador"></div>

  <div id="barra">
    <div id="progreso"></div>
  </div>

  <div id="tiempo">⏱ 0s</div>

  <div id="pregunta"></div>
  <div id="opciones"></div>
  <div id="resultado"></div>
  <div id="explicacion"></div>

  <button id="siguiente" onclick="siguientePregunta()" style="display:none;">Siguiente</button>
</div>

<script>
let preguntas = [];
let fallos = [];
let actual = 0;
let aciertos = 0;
let tiempo = 0;

setInterval(() => {
  tiempo++;
  document.getElementById("tiempo").innerText = `⏱ ${tiempo}s`;
}, 1000);

fetch("preguntas.json")
  .then(res => res.json())
  .then(data => {
    preguntas = data;
    mostrarPregunta();
  });

function mostrarPregunta() {
  const p = preguntas[actual];

  document.getElementById("contador").innerText =
    `Pregunta ${actual + 1} de ${preguntas.length}`;

  document.getElementById("pregunta").innerHTML =
    `<strong>${p.pregunta}</strong>`;

  document.getElementById("progreso").style.width =
    `${(actual / preguntas.length) * 100}%`;

  const contenedor = document.getElementById("opciones");
  contenedor.innerHTML = "";

  const letras = ["A", "B", "C", "D"];

  p.opciones.forEach((op, i) => {
    const btn = document.createElement("button");
    btn.innerText = `${letras[i]}) ${op}`;
    btn.onclick = () => responder(i, btn);
    contenedor.appendChild(btn);
  });

  document.getElementById("resultado").innerText = "";
  document.getElementById("explicacion").innerText = "";
  document.getElementById("siguiente").style.display = "none";
}

function responder(indice, boton) {
  const correcta = preguntas[actual].respuesta;
  const botones = document.querySelectorAll("#opciones button");

  botones.forEach((btn, i) => {
    btn.disabled = true;

    if (i === correcta) btn.classList.add("correcta");
    if (i === indice && i !== correcta) btn.classList.add("incorrecta");
  });

  if (indice === correcta) {
    document.getElementById("resultado").innerText = "✅ Correcto";
    aciertos++;
  } else {
    document.getElementById("resultado").innerText = "❌ Incorrecto";
    fallos.push(preguntas[actual]);
  }

  document.getElementById("explicacion").innerText =
    preguntas[actual].explicacion || "";

  document.getElementById("siguiente").style.display = "block";
}

function siguientePregunta() {
  actual++;

  if (actual < preguntas.length) {
    mostrarPregunta();
  } else {
    finTest();
  }
}

function finTest() {
  const nota = ((aciertos / preguntas.length) * 10).toFixed(2);

  document.querySelector(".card").innerHTML =
    `<h2>Test terminado</h2>
     <p>Aciertos: ${aciertos} / ${preguntas.length}</p>
     <p>Nota: ${nota} / 10</p>
     <p>Tiempo: ${tiempo}s</p>
     <button id="repetir" onclick="repetirFallos()">Repetir fallos</button>`;
}

function repetirFallos() {
  if (fallos.length === 0) {
    alert("No has fallado ninguna 🎉");
    return;
  }

  preguntas = [...fallos];
  fallos = [];
  actual = 0;
  aciertos = 0;
  tiempo = 0;

  location.reload();
}
</script>

</body>
</html>
